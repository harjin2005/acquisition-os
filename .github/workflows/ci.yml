name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Backend: lint / typecheck / import-linter / migrations / RLS+API tests
  # -------------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: acquisition_os
          POSTGRES_PASSWORD: acquisition_os_dev
          POSTGRES_DB: acquisition_os
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U acquisition_os"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      # NOTE: the postgres service container's POSTGRES_USER (below) becomes the
      # Postgres *bootstrap superuser* — superusers unconditionally bypass RLS,
      # regardless of BYPASSRLS/FORCE ROW LEVEL SECURITY. It is used ONLY by the
      # "Provision app + service roles" step to create two real, non-superuser
      # roles. Neither the app nor the service engine may ever connect as it.
      DATABASE_URL: postgresql+psycopg2://acquisition_os_app:acquisition_os_app_dev@localhost:5432/acquisition_os
      DATABASE_URL_ASYNC: postgresql+psycopg://acquisition_os_app:acquisition_os_app_dev@localhost:5432/acquisition_os
      DATABASE_ADMIN_URL: postgresql+psycopg2://acquisition_os_svc:acquisition_os_svc_dev@localhost:5432/acquisition_os
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: acquisition_os_test
      WORKOS_API_KEY: sk_test_ci
      WORKOS_CLIENT_ID: client_ci
      WORKOS_JWKS_URL: https://api.workos.com/sso/jwks/client_ci
      WORKOS_MOCK_MODE: 'true'
      JWT_ISSUER: https://auth.acquisition-os.local
      JWT_AUDIENCE: acquisition-os
      APP_ENV: test
      APP_LOG_LEVEL: WARNING
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Provision app + service roles (neither is the bootstrap superuser)
        run: |
          set -e
          PSQL="psql -h localhost -U acquisition_os -d acquisition_os -v ON_ERROR_STOP=1"
          export PGPASSWORD=acquisition_os_dev
          # `acquisition_os_svc` is the role that actually RUNS migrations:
          # app/db/migrations/env.py resolves its connection as
          # `DATABASE_ADMIN_URL or DATABASE_URL`, and DATABASE_ADMIN_URL is
          # always set here — so it owns the schemas/tables it creates.
          # `acquisition_os_app` (the RLS-restricted app engine) gets DML
          # grants on those tables via ALTER DEFAULT PRIVILEGES so every
          # table alembic creates is automatically usable by the app without
          # a per-migration grant step.
          $PSQL -c "CREATE ROLE acquisition_os_app LOGIN PASSWORD 'acquisition_os_app_dev';"
          $PSQL -c "CREATE ROLE acquisition_os_svc LOGIN PASSWORD 'acquisition_os_svc_dev' BYPASSRLS;"
          $PSQL -c "ALTER DATABASE acquisition_os OWNER TO acquisition_os_svc;"
          $PSQL -c "GRANT ALL ON SCHEMA public TO acquisition_os_svc;"
          $PSQL -c "CREATE SCHEMA IF NOT EXISTS licensed AUTHORIZATION acquisition_os_svc;"
          $PSQL -c "CREATE SCHEMA IF NOT EXISTS core AUTHORIZATION acquisition_os_svc;"
          $PSQL -c "CREATE SCHEMA IF NOT EXISTS derived AUTHORIZATION acquisition_os_svc;"
          $PSQL -c "CREATE SCHEMA IF NOT EXISTS audit AUTHORIZATION acquisition_os_svc;"
          $PSQL -c "CREATE SCHEMA IF NOT EXISTS events AUTHORIZATION acquisition_os_svc;"
          $PSQL -c "GRANT USAGE ON SCHEMA core, licensed, derived, audit, events TO acquisition_os_app;"
          $PSQL -c "ALTER DEFAULT PRIVILEGES FOR ROLE acquisition_os_svc IN SCHEMA core, licensed, derived, audit, events GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO acquisition_os_app;"

      - name: Ruff lint
        working-directory: backend
        run: ruff check .

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check .

      - name: mypy typecheck (Sprint 1 — module-scoped)
        working-directory: backend
        run: mypy app/core app/db app/modules/identity app/modules/ontology || true # advisory in Sprint 1; hard-gate lands Sprint 2

      - name: Import-linter (boundary graph)
        working-directory: backend
        run: lint-imports --config .importlinter

      - name: Ontology naming check (glossary grep)
        run: |
          set -e
          # New identifiers introduced by migrations must be present in the
          # glossary. Sprint 1 seeds a permissive allowlist; the strict version
          # lands with E2 ontology work.
          if [ -d docs/product ]; then
            grep -h -oE '"[a-z_]+"' backend/app/db/migrations/versions/*.py | sort -u > /tmp/migration-idents.txt || true
            wc -l /tmp/migration-idents.txt
          fi

      - name: Alembic upgrade
        working-directory: backend
        run: alembic upgrade head

      - name: RLS adversarial suite (merge-blocking)
        working-directory: backend
        run: pytest tests/rls -q --disable-warnings

      - name: API tests
        working-directory: backend
        run: pytest tests/api -q --disable-warnings

      - name: Integration tests
        working-directory: backend
        run: pytest tests/integration -q --disable-warnings

  # -------------------------------------------------------------------------
  # Frontend: build + unit
  # -------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock
      - name: Install
        working-directory: frontend
        run: yarn install --frozen-lockfile
      - name: Build
        working-directory: frontend
        run: yarn build

  # -------------------------------------------------------------------------
  # Security scans
  # -------------------------------------------------------------------------
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --strict || true
