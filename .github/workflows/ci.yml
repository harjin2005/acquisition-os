name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Backend: lint / typecheck / import-linter / migrations / RLS+API tests
  # -------------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: acquisition_os
          POSTGRES_PASSWORD: acquisition_os_dev
          POSTGRES_DB: acquisition_os
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U acquisition_os"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql+psycopg2://acquisition_os:acquisition_os_dev@localhost:5432/acquisition_os
      DATABASE_URL_ASYNC: postgresql+psycopg://acquisition_os:acquisition_os_dev@localhost:5432/acquisition_os
      DATABASE_ADMIN_URL: postgresql+psycopg2://acquisition_os:acquisition_os_dev@localhost:5432/acquisition_os
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: acquisition_os_test
      WORKOS_API_KEY: sk_test_ci
      WORKOS_CLIENT_ID: client_ci
      WORKOS_JWKS_URL: https://api.workos.com/sso/jwks/client_ci
      WORKOS_MOCK_MODE: 'true'
      JWT_ISSUER: https://auth.acquisition-os.local
      JWT_AUDIENCE: acquisition-os
      APP_ENV: test
      APP_LOG_LEVEL: WARNING
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Grant BYPASSRLS to service role
        run: |
          PGPASSWORD=acquisition_os_dev psql -h localhost -U acquisition_os -d acquisition_os -c "ALTER USER acquisition_os BYPASSRLS;"
          PGPASSWORD=acquisition_os_dev psql -h localhost -U acquisition_os -d acquisition_os -c "CREATE SCHEMA IF NOT EXISTS licensed; CREATE SCHEMA IF NOT EXISTS core; CREATE SCHEMA IF NOT EXISTS derived; CREATE SCHEMA IF NOT EXISTS audit; CREATE SCHEMA IF NOT EXISTS events;"

      - name: Ruff lint
        working-directory: backend
        run: ruff check .

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check .

      - name: mypy typecheck (Sprint 1 — module-scoped)
        working-directory: backend
        run: mypy app/core app/db app/modules/identity app/modules/ontology || true # advisory in Sprint 1; hard-gate lands Sprint 2

      - name: Import-linter (boundary graph)
        working-directory: backend
        run: lint-imports --config .importlinter

      - name: Ontology naming check (glossary grep)
        run: |
          set -e
          # New identifiers introduced by migrations must be present in the
          # glossary. Sprint 1 seeds a permissive allowlist; the strict version
          # lands with E2 ontology work.
          if [ -d docs/product ]; then
            grep -h -oE '"[a-z_]+"' backend/app/db/migrations/versions/*.py | sort -u > /tmp/migration-idents.txt || true
            wc -l /tmp/migration-idents.txt
          fi

      - name: Alembic upgrade
        working-directory: backend
        run: alembic upgrade head

      - name: RLS adversarial suite (merge-blocking)
        working-directory: backend
        run: pytest tests/rls -q --disable-warnings

      - name: API tests
        working-directory: backend
        run: pytest tests/api -q --disable-warnings

      - name: Integration tests
        working-directory: backend
        run: pytest tests/integration -q --disable-warnings

  # -------------------------------------------------------------------------
  # Frontend: build + unit
  # -------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock
      - name: Install
        working-directory: frontend
        run: yarn install --frozen-lockfile
      - name: Build
        working-directory: frontend
        run: yarn build

  # -------------------------------------------------------------------------
  # Security scans
  # -------------------------------------------------------------------------
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --strict || true
